<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbfaf7" />
      <stop offset="100%" stop-color="#f5f2eb" />
    </linearGradient>
    
    <!-- Rabbit Body Gradient -->
    <linearGradient id="rabbitGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#ebdcd0" />
    </linearGradient>
    
    <!-- Inner Ear Gradient -->
    <linearGradient id="innerEarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbe4de" />
      <stop offset="100%" stop-color="#e2aba0" />
    </linearGradient>
    
    <!-- Ribbon Gradient -->
    <linearGradient id="ribbonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c48b81" />
      <stop offset="50%" stop-color="#a86e64" />
      <stop offset="100%" stop-color="#8e554b" />
    </linearGradient>

    <!-- Financier Gradient -->
    <linearGradient id="financierGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e9b872" />
      <stop offset="50%" stop-color="#c0853f" />
      <stop offset="100%" stop-color="#8e5927" />
    </linearGradient>

    <!-- Shadow Filter -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#594a3f" flood-opacity="0.1" />
    </filter>
  </defs>

  <!-- Base Circle (Premium Frame) -->
  <circle cx="200" cy="200" r="180" fill="url(#bgGrad)" stroke="#e9e4d9" stroke-width="4" />
  <circle cx="200" cy="200" r="172" fill="none" stroke="#dcd4c3" stroke-width="1" stroke-dasharray="6 4" />

  <!-- Mascot Group with Shadow -->
  <g filter="url(#softShadow)">
    
    <!-- Rabbit Ears -->
    <!-- Left Ear -->
    <path d="M 155 140 C 130 50, 175 30, 180 140 Z" fill="url(#rabbitGrad)" />
    <path d="M 160 135 C 142 65, 172 55, 175 135 Z" fill="url(#innerEarGrad)" opacity="0.8" />
    
    <!-- Right Ear -->
    <path d="M 245 140 C 270 50, 225 30, 220 140 Z" fill="url(#rabbitGrad)" />
    <path d="M 240 135 C 258 65, 228 55, 225 135 Z" fill="url(#innerEarGrad)" opacity="0.8" />

    <!-- Rabbit Body -->
    <path d="M 140 280 C 140 220, 260 220, 260 280 C 260 310, 140 310, 140 280 Z" fill="url(#rabbitGrad)" />

    <!-- Rabbit Head -->
    <circle cx="200" cy="180" r="60" fill="url(#rabbitGrad)" />

    <!-- Face Details -->
    <!-- Left Eye -->
    <circle cx="178" cy="178" r="4.5" fill="#3c322b" />
    <circle cx="176.5" cy="176.5" r="1.5" fill="#ffffff" />
    
    <!-- Right Eye -->
    <circle cx="222" cy="178" r="4.5" fill="#3c322b" />
    <circle cx="220.5" cy="176.5" r="1.5" fill="#ffffff" />
    
    <!-- Nose & Mouth -->
    <path d="M 197 188 L 203 188 L 200 191 Z" fill="#8a7860" />
    <path d="M 200 191 Q 200 196 197 196 M 200 191 Q 200 196 203 196" fill="none" stroke="#8a7860" stroke-width="1.5" stroke-linecap="round" />
    
    <!-- Pink Cheeks -->
    <ellipse cx="168" cy="186" rx="9" ry="6" fill="#f5c2b6" opacity="0.6" />
    <ellipse cx="232" cy="186" rx="9" ry="6" fill="#f5c2b6" opacity="0.6" />

    <!-- Silk Ribbon Bow (Tied at neck) -->
    <!-- Ribbon Collar -->
    <path d="M 160 225 C 180 232, 220 232, 240 225 C 242 229, 238 234, 230 236 C 210 240, 190 240, 170 236 Z" fill="url(#ribbonGrad)" />
    
    <!-- Left Loop -->
    <path d="M 196 232 C 160 205, 155 240, 196 235 Z" fill="url(#ribbonGrad)" stroke="#7a463c" stroke-width="0.5" />
    <!-- Right Loop -->
    <path d="M 204 232 C 240 205, 245 240, 204 235 Z" fill="url(#ribbonGrad)" stroke="#7a463c" stroke-width="0.5" />
    
    <!-- Ribbon Center Knot -->
    <rect x="194" y="228" width="12" height="12" rx="4" fill="url(#ribbonGrad)" stroke="#7a463c" stroke-width="0.5" />

    <!-- Ribbon Tails -->
    <path d="M 196 238 C 190 250, 170 265, 172 272 C 173 274, 178 274, 182 268 C 192 255, 198 245, 198 238 Z" fill="url(#ribbonGrad)" />
    <path d="M 204 238 C 210 250, 230 265, 228 272 C 227 274, 222 274, 218 268 C 208 255, 202 245, 202 238 Z" fill="url(#ribbonGrad)" />

    <!-- Paws & Financier -->
    <!-- Left Paw -->
    <circle cx="160" cy="255" r="10" fill="url(#rabbitGrad)" />
    
    <!-- Right Paw -->
    <circle cx="240" cy="255" r="10" fill="url(#rabbitGrad)" />

    <!-- Financier (Golden Brown Cake) -->
    <g transform="translate(165, 240)">
      <!-- Golden Body -->
      <rect x="0" y="0" width="70" height="24" rx="4" fill="url(#financierGrad)" stroke="#75481d" stroke-width="1" />
      <!-- Crack/Rise line on top (classic financier shape) -->
      <path d="M 10 12 Q 35 7 60 12" fill="none" stroke="#ffebc2" stroke-width="2" opacity="0.7" stroke-linecap="round" />
      <path d="M 15 11 Q 35 8 55 11" fill="none" stroke="#75481d" stroke-width="1" opacity="0.4" stroke-linecap="round" />
      <!-- Subtle shine/steam/sparkle -->
      <path d="M 12 -8 Q 15 -15 18 -8" fill="none" stroke="#d29a53" stroke-width="1.5" stroke-linecap="round" opacity="0.6" />
      <path d="M 52 -8 Q 55 -15 58 -8" fill="none" stroke="#d29a53" stroke-width="1.5" stroke-linecap="round" opacity="0.6" />
    </g>

    <!-- Little Cute Feet / Paws at bottom -->
    <ellipse cx="170" cy="296" rx="12" ry="7" fill="url(#rabbitGrad)" />
    <ellipse cx="230" cy="296" rx="12" ry="7" fill="url(#rabbitGrad)" />
  </g>
</svg>
